<div id="progress-bar"></div>

<style>
  #progress-bar {
    position: fixed;
    inset: 0 0 auto 0;
    z-index: 60;
    height: 3px;
    width: 0;
    background: linear-gradient(90deg, #ca8a04, #0891b2);
    transition: width 120ms ease-out;
  }

  article .prose[data-pagefind-body] {
    max-width: min(84ch, 100%);
    line-height: 2.05;
  }

  article .prose[data-pagefind-body] p {
    text-align: justify;
    text-justify: inter-word;
  }

  article .prose[data-pagefind-body] figure {
    max-width: min(920px, 100%);
    margin-inline: auto;
  }

  article .prose[data-pagefind-body] blockquote {
    position: relative;
    margin-block: 2rem;
    padding: 1rem 3.25rem 1rem 1.25rem;
    border-inline-start: 0;
    border-inline-end: 4px solid #ca8a04;
    border-radius: 0.75rem;
    background: color-mix(in srgb, #facc15 13%, transparent);
    color: inherit;
    font-style: normal;
  }

  article .prose[data-pagefind-body] blockquote::before {
    content: "⚙";
    position: absolute;
    inset-block-start: 1rem;
    inset-inline-end: 1rem;
    display: grid;
    width: 1.5rem;
    height: 1.5rem;
    place-items: center;
    border-radius: 999px;
    background: #facc15;
    color: #422006;
    font-size: 0.9rem;
    line-height: 1;
  }

  article .prose[data-pagefind-body] blockquote p {
    margin: 0;
  }

  .hb-toc .toc-reading-widget {
    margin-bottom: 1rem;
    border-radius: 0.75rem;
    border: 1px solid rgb(202 138 4 / 0.28);
    background: rgb(250 204 21 / 0.12);
    padding: 0.8rem;
  }

  .hb-toc .toc-reading-widget-label {
    margin-bottom: 0.35rem;
    color: #854d0e;
    font-size: 0.72rem;
    font-weight: 700;
  }

  .hb-toc .toc-reading-widget-title {
    color: #0f172a;
    font-size: 0.86rem;
    font-weight: 800;
    line-height: 1.7;
  }

  .dark .hb-toc .toc-reading-widget {
    border-color: rgb(250 204 21 / 0.28);
    background: rgb(250 204 21 / 0.1);
  }

  .dark .hb-toc .toc-reading-widget-label {
    color: #fde68a;
  }

  .dark .hb-toc .toc-reading-widget-title {
    color: #f8fafc;
  }

  .hb-toc a.toc-active,
  .hb-sidebar-mobile-toc a.toc-active {
    color: #a16207 !important;
    font-weight: 800 !important;
  }

  .hb-toc a.toc-active {
    padding-inline-end: 0.7rem;
    border-inline-end: 3px solid #ca8a04;
  }

  .dark .hb-toc a.toc-active,
  .dark .hb-sidebar-mobile-toc a.toc-active {
    color: #facc15 !important;
  }

  @media (max-width: 768px) {
    article .prose[data-pagefind-body] {
      line-height: 1.95;
    }

    article .prose[data-pagefind-body] blockquote {
      padding-inline: 1rem;
      padding-block-start: 3rem;
    }
  }
</style>

<script>
  (() => {
    const progressBar = document.getElementById('progress-bar');

    const updateProgress = () => {
      if (!progressBar) return;
      const scrollable = document.documentElement.scrollHeight - window.innerHeight;
      const progress = scrollable > 0 ? (window.scrollY / scrollable) * 100 : 0;
      progressBar.style.width = `${Math.min(100, Math.max(0, progress))}%`;
    };

    updateProgress();
    window.addEventListener('scroll', updateProgress, { passive: true });
    window.addEventListener('resize', updateProgress);

    const article = document.querySelector('article .prose[data-pagefind-body]');
    const headings = article ? Array.from(article.querySelectorAll('h2[id], h3[id]')) : [];
    const tocLinks = Array.from(document.querySelectorAll('.hb-toc a[href^="#"], .hb-sidebar-mobile-toc a[href^="#"]'));

    if (!headings.length || !tocLinks.length) return;

    const tocPanel = document.querySelector('.hb-toc .hb-scrollbar');
    const widget = document.createElement('div');
    widget.className = 'toc-reading-widget';
    widget.setAttribute('aria-live', 'polite');
    widget.innerHTML = '<div class="toc-reading-widget-label">در حال خواندن</div><div class="toc-reading-widget-title"></div>';
    tocPanel?.insertBefore(widget, tocPanel.querySelector('ul'));

    const widgetTitle = widget.querySelector('.toc-reading-widget-title');
    const linksById = new Map();

    tocLinks.forEach((link) => {
      try {
        const id = decodeURIComponent(link.hash.slice(1));
        const matches = linksById.get(id) || [];
        matches.push(link);
        linksById.set(id, matches);
      } catch {
        // Keep malformed third-party anchors from breaking the reading widget.
      }
    });

    const setActiveHeading = (heading) => {
      if (!heading) return;
      tocLinks.forEach((link) => link.classList.remove('toc-active'));
      (linksById.get(heading.id) || []).forEach((link) => link.classList.add('toc-active'));
      if (widgetTitle) widgetTitle.textContent = heading.textContent.trim();
    };

    const getCurrentHeading = () => {
      const offset = Math.round(window.innerHeight * 0.28);
      let current = headings[0];

      headings.forEach((heading) => {
        if (heading.getBoundingClientRect().top <= offset) {
          current = heading;
        }
      });

      return current;
    };

    setActiveHeading(getCurrentHeading());
    window.addEventListener('scroll', () => setActiveHeading(getCurrentHeading()), { passive: true });
    window.addEventListener('resize', () => setActiveHeading(getCurrentHeading()));
  })();
</script>
